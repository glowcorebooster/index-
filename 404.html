<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting… — GlowCore Booster</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#fff8fc;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Poppins',sans-serif;}
    .wrap{text-align:center;padding:2rem;}
    .spinner{width:48px;height:48px;border-radius:50%;background:conic-gradient(#ff2d87,#ff6b00,#ffaa00,#ff2d87);animation:spin .8s linear infinite;-webkit-mask:radial-gradient(circle,transparent 55%,black 56%);margin:0 auto 1rem;}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{color:#8a5070;font-size:.85rem;font-weight:600;}
    a{color:#ff2d87;font-weight:700;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>Redirecting… <a href="index.html">Go to store</a></p>
</div>
<script>
  (function(){
    var path = window.location.pathname;
    var base = '/index-'; // your GitHub Pages subfolder

    // /p/productid → product.html?id=productid
    var pMatch = path.match(/\/p\/([^\/]+)/);
    if(pMatch){
      window.location.replace(base + '/product.html?id=' + encodeURIComponent(pMatch[1]));
      return;
    }

    // /checkout → checkout-page.html
    if(path.match(/\/checkout$/)){
      window.location.replace(base + '/checkout-page.html');
      return;
    }

    // fallback → homepage
    window.location.replace(base + '/index.html');
  })();
</script>
</body>
</html>
