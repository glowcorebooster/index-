<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Checkout — GlowCore Booster ✨</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--pink:#ff2d87;--hot:#ff0066;--orange:#ff6b00;--gold:#ffaa00;--bg:#fff8fc;--text:#1a0010;--muted:#8a5070;--border:rgba(255,45,135,0.18);}
    html,body{height:100%;}
    body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

    /* ANIMATED BORDER FRAME */
    body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;border:6px solid transparent;border-image:linear-gradient(var(--angle,0deg),#ff2d87,#ff6b00,#ffaa00,#ffe033,#ff6b00,#ff2d87) 1;animation:rotateBorder 3s linear infinite;}
    @property --angle{syntax:'<angle>';initial-value:0deg;inherits:false;}
    @keyframes rotateBorder{to{--angle:360deg;}}

    nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(255,248,252,.95);border-bottom:2px solid var(--border);backdrop-filter:blur(16px);position:relative;z-index:10;}
    nav::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--orange),var(--gold),var(--orange),var(--pink));background-size:200%;animation:shimmerLine 3s linear infinite;}
    @keyframes shimmerLine{0%{background-position:0%;}100%{background-position:200%;}}

    .logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;}
    .logo img{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(255,45,135,.4));}
    .logo-text{font-family:'Lilita One',cursive;font-weight:900;font-size:1.1rem;background:linear-gradient(135deg,var(--hot),var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .back-link{display:flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.82rem;text-decoration:none;transition:color .2s;font-weight:600;}
    .back-link:hover{color:var(--hot);}

    .checkout-bar{padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;border-bottom:1px solid var(--border);background:#fff;position:relative;z-index:5;}
    .checkout-bar h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;background:linear-gradient(135deg,var(--hot),var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .checkout-bar p{font-size:.75rem;color:var(--muted);margin-top:.15rem;font-weight:600;}

    .trust-badges{display:flex;gap:1rem;flex-wrap:wrap;}
    .badge{display:flex;align-items:center;gap:.35rem;font-size:.73rem;font-weight:700;padding:.35rem .85rem;border-radius:99px;background:rgba(255,45,135,.06);border:1.5px solid rgba(255,45,135,.15);color:var(--hot);}

    .iframe-wrap{flex:1;position:relative;min-height:calc(100vh - 160px);}
    .loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:var(--bg);z-index:1;transition:opacity .4s;}
    .loader.gone{opacity:0;pointer-events:none;}
    .spinner{width:50px;height:50px;border-radius:50%;background:conic-gradient(var(--hot),var(--orange),var(--gold),var(--pink),var(--hot));animation:spin .9s linear infinite;-webkit-mask:radial-gradient(circle,transparent 55%,black 56%);}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader p{font-size:.82rem;color:var(--muted);font-weight:600;}

    .fallback{display:none;margin:1.5rem 2rem;background:rgba(255,107,0,.06);border:1.5px solid rgba(255,107,0,.2);border-radius:14px;padding:1.1rem 1.4rem;font-size:.85rem;color:var(--muted);align-items:center;gap:1rem;font-weight:600;}
    .fallback.show{display:flex;}
    .fallback a{color:var(--hot);font-weight:700;}

    iframe.checkout-frame{width:100%;height:100%;min-height:calc(100vh - 160px);border:none;display:block;}

    footer{text-align:center;padding:1.5rem;font-size:.72rem;color:#fff;border-top:1px solid var(--border);background:linear-gradient(135deg,var(--hot),var(--orange),var(--gold));font-weight:600;position:relative;z-index:5;}

    @media(max-width:600px){.trust-badges{display:none;}nav,.checkout-bar{padding:1rem 1.2rem;}}
  </style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">
    <img src="images/logo.png" alt="GlowCore" onerror="this.style.display='none'"/>
    <span class="logo-text">GlowCore Booster</span>
  </a>
  <a href="index.html" class="back-link">← Back to Store</a>
</nav>
<div class="checkout-bar">
  <div>
    <h1>Secure Checkout ✨</h1>
    <p>Powered by Digistore24 — encrypted &amp; safe</p>
  </div>
  <div class="trust-badges">
    <div class="badge">🔒 SSL Secured</div>
    <div class="badge">💳 Safe Payment</div>
    <div class="badge">✨ 30-Day Guarantee</div>
  </div>
</div>
<div class="fallback" id="fallback">
  ⚠️ Checkout could not load here.
  <a id="fallbackLink" href="#" target="_blank" rel="noopener">Open checkout page →</a>
</div>
<div class="iframe-wrap">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Loading secure checkout…</p>
  </div>
  <iframe class="checkout-frame" id="frame" title="Secure Checkout" allow="payment"></iframe>
</div>
<footer>🔒 Payment processed securely by Digistore24 &nbsp;·&nbsp; &copy; 2026 GlowCore Booster 💖</footer>
<script>
  const link = localStorage.getItem('gc_checkout_link') || '';
  // clear after reading so it doesn't persist
  if(link) localStorage.removeItem('gc_checkout_link');
  const frame=document.getElementById('frame');
  const loader=document.getElementById('loader');
  const fallback=document.getElementById('fallback');
  const fbLink=document.getElementById('fallbackLink');
  if(!link){loader.classList.add('gone');fallback.classList.add('show');fbLink.textContent='Go back to store';fbLink.href='index.html';}
  else{
    fbLink.href=link;frame.src=link;
    frame.addEventListener('load',()=>loader.classList.add('gone'));
    frame.addEventListener('error',()=>{loader.classList.add('gone');fallback.classList.add('show');});
    setTimeout(()=>loader.classList.add('gone'),9000);
  }
</script>
</body>
</html>
