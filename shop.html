<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — GlowCore Booster ✨</title>
  <meta name="description" content="Browse all GlowCore Booster products — premium beauty supplements for radiant skin."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --pink:#ff2d87;--hot:#ff0066;--orange:#ff6b00;
      --gold:#ffaa00;--yellow:#ffe033;
      --bg:#fff8fc;--white:#ffffff;
      --text:#1a0010;--muted:#8a5070;
      --border:rgba(255,45,135,0.18);
    }
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;overflow-x:hidden;}

    body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;border:6px solid transparent;border-image:linear-gradient(var(--angle,0deg),#ff2d87,#ff6b00,#ffaa00,#ffe033,#ff6b00,#ff2d87) 1;animation:rotateBorder 3s linear infinite;}
    @property --angle{syntax:'<angle>';initial-value:0deg;inherits:false;}
    @keyframes rotateBorder{to{--angle:360deg;}}

    .mesh-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse at 0% 0%,rgba(255,45,135,.12) 0%,transparent 45%),
                 radial-gradient(ellipse at 100% 0%,rgba(255,107,0,.1) 0%,transparent 45%),
                 radial-gradient(ellipse at 50% 100%,rgba(255,170,0,.1) 0%,transparent 45%);
      animation:meshShift 8s ease-in-out infinite alternate;}
    @keyframes meshShift{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(20deg);}}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:.85rem;padding:.7rem 1.5rem;margin:6px;border-radius:16px;background:rgba(255,248,252,.93);backdrop-filter:blur(20px);border:2px solid transparent;background-clip:padding-box;box-shadow:0 4px 30px rgba(255,45,135,.12);}
    nav::before{content:'';position:absolute;inset:-2px;border-radius:18px;z-index:-1;background:linear-gradient(135deg,var(--pink),var(--orange),var(--gold),var(--pink));background-size:300% 300%;animation:gradShift 4s ease infinite;}
    @keyframes gradShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    .nav-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;flex-shrink:0;}
    .nav-logo-img{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(255,45,135,.35));}
    .nav-brand{font-family:'Lilita One',cursive;font-size:1rem;background:linear-gradient(135deg,var(--hot),var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
    .nav-search{flex:1;max-width:340px;position:relative;min-width:0;}
    .nav-search-input{width:100%;padding:.52rem 2rem .52rem 2.1rem;background:rgba(255,45,135,.06);border:2px solid rgba(255,45,135,.16);border-radius:99px;color:var(--text);font-size:.78rem;font-family:'Poppins',sans-serif;font-weight:500;transition:all .25s;}
    .nav-search-input:focus{outline:none;border-color:var(--pink);background:rgba(255,45,135,.1);box-shadow:0 0 0 4px rgba(255,45,135,.1);}
    .nav-search-input::placeholder{color:var(--muted);}
    .nav-search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:.78rem;pointer-events:none;}
    .nav-search-clear{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:var(--pink);border:none;color:#fff;font-size:.55rem;font-weight:900;cursor:pointer;display:none;align-items:center;justify-content:center;}
    .nav-search-clear.show{display:flex;}
    .nav-socials{display:flex;gap:.38rem;flex-shrink:0;margin-left:auto;}
    .nav-social{width:30px;height:30px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;transition:transform .2s;flex-shrink:0;}
    .nav-social:hover{transform:translateY(-2px) scale(1.1);}
    .nav-social.fb{background:linear-gradient(135deg,#1877f2,#0a5bc4);}
    .nav-social.ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
    .nav-social.yt{background:linear-gradient(135deg,#ff0000,#cc0000);}
    .nav-social.tt{background:linear-gradient(135deg,#010101,#2d2d2d);}
    @media(max-width:700px){nav{padding:.6rem 1rem;margin:4px;gap:.5rem;}.nav-brand{font-size:.85rem;}.nav-search{max-width:160px;}.nav-socials{display:none;}}

    /* SHOP HEADER */
    .shop-header{position:relative;z-index:1;text-align:center;padding:6.5rem 1.5rem 2rem;}
    .shop-header h1{font-family:'Lilita One',cursive;font-size:clamp(1.8rem,5vw,3rem);background:linear-gradient(135deg,var(--hot),var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem;}
    .shop-header p{font-size:.85rem;color:var(--muted);font-weight:500;}
    .shop-meta{display:inline-flex;align-items:center;gap:.5rem;margin-top:.75rem;background:rgba(255,45,135,.07);border:1.5px solid rgba(255,45,135,.15);border-radius:99px;padding:.3rem .9rem;font-size:.72rem;font-weight:600;color:var(--muted);}
    .shop-meta span{color:var(--hot);font-weight:800;}

    /* FILTERS */
    .shop-filters{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;padding:.5rem 1.5rem 1.25rem;max-width:1200px;margin:0 auto;}
    .search-label{font-size:.78rem;color:var(--muted);font-weight:600;display:none;}
    .search-label.show{display:block;}
    .search-label span{color:var(--hot);font-weight:700;}
    .highlight{background:rgba(255,45,135,.14);color:var(--hot);border-radius:3px;padding:0 2px;}

    /* GRID */
    .shop-main{position:relative;z-index:1;padding:0 1rem 2rem;max-width:1200px;margin:0 auto;}
    .products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
    @media(max-width:900px){.products-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:500px){.products-grid{grid-template-columns:repeat(2,1fr);gap:.6rem;}}

    /* LOADING */
    .loading-wrap{text-align:center;padding:4rem 2rem;grid-column:1/-1;}
    .loading-dots{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem;}
    .loading-dots span{width:12px;height:12px;border-radius:50%;animation:bounceDot 1.2s infinite ease-in-out;}
    .loading-dots span:nth-child(1){background:var(--pink);animation-delay:0s;}
    .loading-dots span:nth-child(2){background:var(--orange);animation-delay:.15s;}
    .loading-dots span:nth-child(3){background:var(--gold);animation-delay:.3s;}
    @keyframes bounceDot{0%,100%{transform:translateY(0) scale(.8);opacity:.4;}50%{transform:translateY(-12px) scale(1.1);opacity:1;}}

    /* PRODUCT CARD */
    .prod-card{background:#fff;border-radius:18px;overflow:visible;position:relative;border:2.5px solid transparent;background-clip:padding-box;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;animation:cardReveal .5s cubic-bezier(.16,1,.3,1) both;}
    .prod-card::after{content:'';position:absolute;inset:-2.5px;border-radius:21px;z-index:-1;background:linear-gradient(135deg,var(--pink),var(--orange),var(--gold),var(--pink));background-size:300% 300%;animation:gradShift 4s ease infinite;}
    @keyframes cardReveal{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:none;}}
    .prod-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(255,45,135,.15);}
    .ribbon{position:absolute;top:10px;left:-3px;z-index:3;background:linear-gradient(135deg,var(--hot),var(--orange));color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;padding:.22rem .6rem .22rem .45rem;border-radius:0 5px 5px 0;box-shadow:2px 2px 8px rgba(255,45,135,.3);}
    .card-img-link{display:block;overflow:hidden;border-radius:15px 15px 0 0;cursor:pointer;}
    .card-img{width:100%;height:160px;object-fit:cover;display:block;transition:transform .4s;}
    .prod-card:hover .card-img{transform:scale(1.05);}
    .card-img-placeholder{width:100%;height:160px;background:linear-gradient(135deg,#ffe0f0,#fff5e0,#ffe8cc);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:2.2rem;}
    .card-body{padding:.75rem;}
    .card-text-link{cursor:pointer;display:block;text-decoration:none;color:inherit;}
    .card-text-link:hover .card-title{color:var(--hot);}
    .card-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;color:var(--text);margin-bottom:.25rem;line-height:1.3;transition:color .2s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .card-desc{font-size:.68rem;color:var(--muted);line-height:1.55;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.5rem;}
    .card-variants-label{font-size:.58rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:.5rem 0 .3rem;}
    .card-variants-row{display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.5rem;}
    .card-variant-btn{font-size:.6rem;font-weight:700;padding:.22rem .52rem;border-radius:7px;background:rgba(255,45,135,.06);border:1.5px solid rgba(255,45,135,.18);color:var(--muted);cursor:pointer;font-family:'Poppins',sans-serif;transition:all .18s;white-space:nowrap;}
    .card-variant-btn:hover{border-color:var(--pink);color:var(--hot);}
    .card-variant-btn.active{background:rgba(255,0,102,.1);border-color:var(--hot);color:var(--hot);}
    .card-footer{display:flex;align-items:center;justify-content:space-between;gap:.4rem;flex-wrap:wrap;margin-top:.4rem;}
    .card-price-display{font-family:'Lilita One',cursive;font-size:1.1rem;background:linear-gradient(135deg,var(--hot),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .buy-btn{display:inline-flex;align-items:center;gap:.3rem;background:linear-gradient(135deg,var(--hot),var(--orange),var(--gold));background-size:200%;animation:gradShift 3s ease infinite;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.72rem;padding:.42rem .85rem;border-radius:8px;border:none;cursor:pointer;text-decoration:none;box-shadow:0 3px 12px rgba(255,45,135,.25);transition:transform .2s,opacity .2s;white-space:nowrap;}
    .buy-btn:hover:not(.disabled){transform:translateY(-1px);animation:none;}
    .buy-btn.disabled{background:linear-gradient(135deg,#ccc,#bbb);animation:none;opacity:.55;cursor:not-allowed;box-shadow:none;}

    /* EMPTY */
    .empty-state{text-align:center;padding:4rem 2rem;grid-column:1/-1;color:var(--muted);}
    .empty-state .ei{font-size:3rem;margin-bottom:.8rem;}
    .empty-state p{font-size:.9rem;font-weight:500;line-height:1.8;}

    /* PAGINATION */
    .pagination{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:1.5rem 1rem 3rem;flex-wrap:wrap;}
    .page-btn{width:38px;height:38px;border-radius:10px;border:2px solid rgba(255,45,135,.18);background:#fff;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .page-btn:hover{border-color:var(--pink);color:var(--hot);}
    .page-btn.active{background:linear-gradient(135deg,var(--hot),var(--orange));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(255,45,135,.3);}
    .page-btn.arr{font-size:1rem;}
    .page-info{font-size:.72rem;color:var(--muted);font-weight:600;padding:0 .5rem;}

    /* FOOTER */
    footer{position:relative;z-index:1;text-align:center;padding:2.5rem 2rem;background:linear-gradient(135deg,var(--hot),var(--orange),var(--gold));margin:0 8px 8px;border-radius:24px 24px 0 0;}
    .footer-logo{font-family:'Lilita One',cursive;font-size:1.3rem;color:#fff;margin-bottom:.4rem;}
    footer p{font-size:.7rem;opacity:.8;font-weight:500;color:#fff;}
    .back-btn{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:.4rem 1rem;border-radius:99px;text-decoration:none;margin-bottom:1rem;transition:background .2s;}
    .back-btn:hover{background:rgba(255,255,255,.35);}

    #copyToast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);z-index:9999;background:var(--text);color:#fff;font-size:.8rem;font-weight:700;padding:.65rem 1.4rem;border-radius:99px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
    #copyToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
<div class="mesh-bg"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <img class="nav-logo-img" src="images/glowcorebooster.png" alt="GlowCore" onerror="this.style.display='none'"/>
    <span class="nav-brand">GlowCoreBooster</span>
  </a>
  <div class="nav-search">
    <span class="nav-search-icon">🔍</span>
    <input class="nav-search-input" id="searchInput" type="text" placeholder="Search products…" oninput="onSearch(this.value)" autocomplete="off"/>
    <button class="nav-search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="nav-socials">
    <a class="nav-social fb" href="https://facebook.com/glowcorebooster" target="_blank" rel="noopener"><svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
    <a class="nav-social ig" href="https://instagram.com/glowcorebooster" target="_blank" rel="noopener"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg></a>
    <a class="nav-social yt" href="https://youtube.com/@glowcorebooster" target="_blank" rel="noopener"><svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58a2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#ff0000"/></svg></a>
    <a class="nav-social tt" href="https://tiktok.com/@glowcorebooster" target="_blank" rel="noopener"><svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34l-.04-8.33a8.27 8.27 0 0 0 4.84 1.55V4.98a4.85 4.85 0 0 1-1.03-.29z"/></svg></a>
  </div>
</nav>

<!-- SHOP HEADER -->
<div class="shop-header">
  <h1>Our Products 🛍️</h1>
  <p>Premium beauty supplements for your natural glow</p>
  <div class="shop-meta">Showing <span id="metaCount">0</span> products</div>
</div>

<!-- FILTERS -->
<div class="shop-filters">
  <div class="search-label" id="searchLabel"></div>
</div>

<!-- MAIN GRID -->
<div class="shop-main">
  <div class="products-grid" id="productsGrid">
    <div class="loading-wrap"><div class="loading-dots"><span></span><span></span><span></span></div><p>Loading products…</p></div>
  </div>
</div>

<!-- PAGINATION -->
<div class="pagination" id="pagination"></div>

<!-- FOOTER -->
<footer>
  <a class="back-btn" href="index.html">← Back to Home</a>
  <div class="footer-logo">✨ GlowCore Booster ✨</div>
  <p>&copy; 2026 GlowCore Booster · Made with 💖 in the Philippines</p>
</footer>

<div id="copyToast">✅ Link copied!</div>

<script>
  const SITE_URL = window.location.origin;
  const PER_PAGE = 12;
  let allProducts = [], searchQuery = '', currentPage = 1;

  function getScriptUrl(){ return localStorage.getItem('gc_script_url')||''; }

  async function loadProducts(){
    const scriptUrl = getScriptUrl();
    if(!scriptUrl){
      try{
        const res = await fetch('products.json?t='+Date.now());
        const data = await res.json();
        allProducts = data.filter(p=>p.published);
        render();
      }catch(e){ allProducts=[]; render(); }
      return;
    }
    try{
      const res = await fetch(scriptUrl+'?action=getProducts');
      const json = await res.json();
      allProducts = json.success ? (json.data||[]).filter(p=>p.published) : [];
      render();
    }catch(e){
      try{
        const res = await fetch('products.json?t='+Date.now());
        const data = await res.json();
        allProducts = data.filter(p=>p.published);
      }catch(e2){ allProducts=[]; }
      render();
    }
  }

  function onSearch(val){
    searchQuery = val.trim();
    currentPage = 1;
    document.getElementById('searchClear').classList.toggle('show', searchQuery.length>0);
    render();
  }
  function clearSearch(){
    document.getElementById('searchInput').value='';
    document.getElementById('searchClear').classList.remove('show');
    searchQuery=''; currentPage=1; render();
  }

  function selectCardVariant(pid, idx){
    const p = allProducts.find(x=>x.id===pid); if(!p) return;
    const v = p.variants[idx];
    document.querySelectorAll(`.card-variant-btn[data-pid="${pid}"]`).forEach((b,i)=>b.classList.toggle('active',i===idx));
    const priceEl = document.getElementById(`card-price-${pid}`);
    if(priceEl) priceEl.textContent = v.price;
    const buyBtn = document.getElementById(`buy-btn-${pid}`);
    if(buyBtn){ buyBtn.classList.remove('disabled'); buyBtn.removeAttribute('disabled'); buyBtn.dataset.link = v.checkoutLink; }
  }

  function goToProduct(pid){ window.location.href = `product.html?id=${pid}`; }

  function goCheckout(e, link){
    e.preventDefault();
    if(!link||link==='#') return;
    localStorage.setItem('gc_checkout_link', link);
    window.location.href = 'checkout-page.html';
  }

  function render(){
    const grid = document.getElementById('productsGrid');
    const label = document.getElementById('searchLabel');
    const q = searchQuery.toLowerCase();
    let list = allProducts;

    if(searchQuery){
      list = allProducts.filter(p=>(p.title||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));
      label.className='search-label show';
      label.innerHTML = list.length
        ? `${list.length} result${list.length!==1?'s':''} for "<span>${esc(searchQuery)}</span>"`
        : `Walang nahanap para sa "<span>${esc(searchQuery)}</span>"`;
    } else {
      label.className='search-label';
    }

    document.getElementById('metaCount').textContent = list.length;

    if(!allProducts.length){
      grid.innerHTML=`<div class="empty-state"><div class="ei">💖</div><p>No products yet. Check back soon!</p></div>`;
      document.getElementById('pagination').innerHTML='';
      return;
    }
    if(searchQuery && !list.length){
      grid.innerHTML=`<div class="empty-state"><div class="ei">🔍</div><p>Walang nahanap.<br>Subukan ang ibang keyword.</p></div>`;
      document.getElementById('pagination').innerHTML='';
      return;
    }

    // Pagination
    const totalPages = Math.ceil(list.length / PER_PAGE);
    if(currentPage > totalPages) currentPage = 1;
    const start = (currentPage-1)*PER_PAGE;
    const pageList = list.slice(start, start+PER_PAGE);

    grid.innerHTML = pageList.map((p,i)=>{
      const variants = p.variants||[];
      const firstPrice = variants.length ? variants[0].price : '';
      const firstLink = variants.length && variants[0].checkoutLink ? variants[0].checkoutLink : '#';
      const buyEnabled = variants.length > 0;

      const variantBtns = variants.map((v,vi)=>`
        <button class="card-variant-btn${vi===0?' active':''}" data-pid="${p.id}" onclick="event.stopPropagation();selectCardVariant('${p.id}',${vi})">${esc(v.name)}</button>
      `).join('');

      return `
      <div class="prod-card" style="animation-delay:${i*.06}s;">
        <div class="ribbon">✨ Best Seller</div>
        <div class="card-img-link" onclick="goToProduct('${p.id}')">
          ${p.imageUrl
            ?`<img class="card-img" src="${esc(p.imageUrl)}" alt="${esc(p.title||'')}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>✨</div>'">`
            :`<div class="card-img-placeholder">✨</div>`}
        </div>
        <div class="card-body">
          <div class="card-text-link" onclick="goToProduct('${p.id}')">
            <div class="card-title">${esc(p.title||'')}</div>
            <div class="card-desc">${esc(p.description||'')}</div>
          </div>
          ${variants.length?`<div class="card-variants-label">Package</div><div class="card-variants-row">${variantBtns}</div>`:''}
          <div class="card-footer">
            <div class="card-price-display" id="card-price-${p.id}">${esc(firstPrice)}</div>
            <a id="buy-btn-${p.id}" class="buy-btn${buyEnabled?'':' disabled'}" href="checkout-page.html" data-link="${esc(firstLink)}" onclick="if(this.classList.contains('disabled')){event.preventDefault();return;}goCheckout(event,this.dataset.link)">🛒 Buy</a>
          </div>
        </div>
      </div>`;
    }).join('');

    // Render pagination
    renderPagination(totalPages);
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function renderPagination(total){
    const wrap = document.getElementById('pagination');
    if(total <= 1){ wrap.innerHTML=''; return; }
    let html = '';
    html += `<button class="page-btn arr" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled style="opacity:.4;cursor:not-allowed"':''}>‹</button>`;
    for(let i=1;i<=total;i++){
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn arr" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled style="opacity:.4;cursor:not-allowed"':''}>›</button>`;
    html += `<span class="page-info">Page ${currentPage} of ${total}</span>`;
    wrap.innerHTML = html;
  }

  function goPage(n){
    const total = Math.ceil((searchQuery ? allProducts.filter(p=>(p.title||'').toLowerCase().includes(searchQuery.toLowerCase())).length : allProducts.length) / PER_PAGE);
    if(n<1||n>total) return;
    currentPage = n;
    render();
  }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  loadProducts();
</script>
</body>
</html>
